version: "3.9"

# Docker Compose para Produção - KVM 2 Hostinger
# 2 vCPU, 4 GB RAM, 50 GB SSD
# Database: Neon (PostgreSQL Serverless)

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production

    container_name: tolivre-app
    restart: unless-stopped

    # Limites de recursos (~62% da RAM = 2.5 GB - sem PostgreSQL local)
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2560M
        reservations:
          cpus: "0.75"
          memory: 1280M

    ports:
      - "3000:3000"

    environment:
      # Database (Neon)
      POSTGRES_URL: ${POSTGRES_URL:?POSTGRES_URL is required - Use your Neon connection string}

      # Node.js
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
      PORT: 3000

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # URLs
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://ocupae.com.br}

      # Uazapi (WhatsApp)
      UAZAPI_URL: ${UAZAPI_URL}
      UAZAPI_TOKEN: ${UAZAPI_TOKEN}
      UAZAPI_HEADER: ${UAZAPI_HEADER}

      # Mercado Pago
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}

      # reCAPTCHA
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}

    volumes:
      - ./uploads:/app/uploads
      - app_logs:/app/logs

    networks:
      - tolivre-network

    # Health check interno do container (localhost = dentro do container)
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Reverse Proxy (Opcional mas recomendado)
  nginx:
    image: nginx:alpine
    container_name: tolivre-nginx
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

    networks:
      - tolivre-network

    depends_on:
      - app

    # Health check interno do Nginx (localhost = dentro do container)
    # Externamente o site estará disponível em https://ocupae.com.br
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot para SSL (Let's Encrypt)
  certbot:
    image: certbot/certbot:latest
    container_name: tolivre-certbot

    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

    # Renovação automática (a cada 12 horas)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  app_logs:
    driver: local

networks:
  tolivre-network:
    driver: bridge
